          "dateModified": "2026-03-07"
        },
        {
          "@type": "Organization",
          "@id": "https://satoshidashboard.com/#organization",
          "name": "Satoshi Dashboard",
          "url": "https://satoshidashboard.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://satoshidashboard.com/logo.svg",
            "width": 200,
            "height": 60
          },
          "sameAs": [
            "https://github.com/Satoshi-Dashboard/main"
          ]
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What is Satoshi Dashboard?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Satoshi Dashboard is a free, open-source Bitcoin analytics platform with 29 interactive modules covering real-time price, mempool congestion, on-chain metrics (MVRV, Stock-to-Flow, UTXO), network health, sentiment (Fear & Greed), and macro comparisons (BTC vs Gold, Big Mac Index). Data is sourced from Binance, CoinGecko, mempool.space, Bitnodes, and BitInfoCharts."
              }
            },
            {
              "@type": "Question",
              "name": "What is the Bitcoin Fear & Greed Index?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The Bitcoin Fear & Greed Index is a daily sentiment indicator from 0 to 100. A score near 0 means Extreme Fear (market panic, potential buying opportunity) and near 100 means Extreme Greed (market overheating, potential correction risk). Satoshi Dashboard sources it from Alternative.me and shows 7-day and 30-day history."
              }
            },
            {
              "@type": "Question",
              "name": "What is the Mayer Multiple?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The Mayer Multiple is Bitcoin's current price divided by its 200-day moving average. A value below 1.0 has historically been a strong accumulation signal; above 2.4 has indicated market overheating. Satoshi Dashboard displays the current multiple with historical overbought and oversold thresholds."
              }
            },
            {
              "@type": "Question",
              "name": "What is MVRV in Bitcoin?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "MVRV (Market Value to Realized Value) compares Bitcoin's market capitalization to its realized cap — the sum of all coins valued at the price they last moved. An MVRV above 3.5 has historically coincided with cycle tops; below 1 with cycle bottoms. Satoshi Dashboard tracks this metric in real time."
              }
            },
            {
              "@type": "Question",
              "name": "How many Bitcoin full nodes are there?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "There are typically 15,000–20,000 reachable Bitcoin full nodes worldwide at any given time. Satoshi Dashboard shows the current count and a world map of node distribution, sourced from Bitnodes."
              }
            },
            {
              "@type": "Question",
              "name": "What is the Bitcoin Stock-to-Flow model?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Bitcoin's Stock-to-Flow (S2F) model, created by analyst PlanB, measures scarcity by dividing existing supply by annual new supply. Bitcoin's S2F ratio roughly doubles after each halving (~every 4 years), making it increasingly scarce over time. Satoshi Dashboard plots the S2F model against actual Bitcoin price history."
              }
            }
          ]
        }
      ]
