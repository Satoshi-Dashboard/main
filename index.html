                "@type": "Answer",

            },

              "@type": "Question",
              "name": "What is the Mayer Multiple?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "The Mayer Multiple is Bitcoin's current price divided by its 200-day moving average. A value below 1.0 has historically been a strong accumulation signal; above 2.4 has indicated market overheating. Satoshi Dashboard displays the current multiple with historical overbought and oversold thresholds."
              }
            },
            {
              "@type": "Question",
              "name": "What is MVRV in Bitcoin?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "MVRV (Market Value to Realized Value) compares Bitcoin's market capitalization to its realized cap — the sum of all coins valued at the price they last moved. An MVRV above 3.5 has historically coincided with cycle tops; below 1 with cycle bottoms. Satoshi Dashboard tracks this metric in real time."
              }
            },

                "@type": "Answer",
